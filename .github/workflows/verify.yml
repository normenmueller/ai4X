name: verify

on:
  push:
    branches: ["trunk"]
  pull_request:
    branches: ["trunk"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: utl/ai4x/src/package-lock.json
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Install dependencies
        run: npm --prefix ./utl/ai4x/src ci
      - name: Verify
        run: npm --prefix ./utl/ai4x/src run verify
