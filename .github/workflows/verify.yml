name: verify

on:
  push:
    branches: ["trunk"]
  pull_request:
    branches: ["trunk"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23"
      - name: Verify repository metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash ./utl/gh/repo-metadata.sh --check
      - name: Verify
        run: make verify
      - name: Doctor
        run: make doctor
      - name: Capability quality gates
        run: cd utl/cap && npm ci && npm run check
      - name: Capability tests
        run: cd utl/cap && npm test
