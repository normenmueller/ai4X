# ~/.config/ai4x/config.yaml
# Installed by `make install`. Defines system-wide hosts and runtimes.
# Merge rule: project keys win. A project runtime/host REPLACES the global one (no deep-merge).

version: 0.1.0

hosts:
  codex:
    adapter: codex/cli
    run:
      command: ["codex"]
      options:
        - req: ["--model", "{runtime.params.model}"]
        - req: ["--ask-for-approval", "{runtime.params.approval}"]

  copilot:
    adapter: copilot/cli
    run:
      command: ["copilot"]
      options:
        - req: ["--model", "{runtime.params.model}"]

  vscode+copilot:
    adapter: copilot/vscode
    run:
      command: ["code"]
      options:
        - req: ["-n", ".", "--wait"]

runtimes:
  altman:
    host: codex
    params:
      model: "gpt-5.4"
      approval: "on-request"

  nadella:
    host: copilot
    params:
      model: "claude-opus-4.6"

  satya:
    host: vscode+copilot
